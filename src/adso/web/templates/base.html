<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Adso{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-background text-foreground font-sans antialiased">
  <header class="sticky top-0 z-10 border-b bg-background/95 backdrop-blur">
    <div class="mx-auto flex h-14 max-w-5xl items-center gap-3 px-4">
      <a href="/" class="text-lg font-semibold tracking-tight">Adso</a>
      <span class="badge-secondary hidden sm:inline-flex">local</span>
      <nav class="ml-auto flex items-center gap-4 text-sm">
        <a href="/" class="text-muted-foreground hover:text-foreground">Catalogue</a>
        <a href="/import" class="text-muted-foreground hover:text-foreground">Import</a>
        <a href="/export" class="text-muted-foreground hover:text-foreground">Export</a>
        <a href="/activity" class="text-muted-foreground hover:text-foreground">Activity</a>
        <a href="/conflicts" class="flex items-center gap-1.5 text-muted-foreground hover:text-foreground">
          Conflicts
          <span id="nav-conflict-badge">{% if pending_count %}<span class="badge-destructive">{{ pending_count }}</span>{% endif %}</span>
        </a>
        <a href="/duplicates" class="flex items-center gap-1.5 text-muted-foreground hover:text-foreground">
          Duplicates
          <span id="nav-duplicate-badge">{% if duplicate_count %}<span class="badge-destructive">{{ duplicate_count }}</span>{% endif %}</span>
        </a>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-5xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>
  <footer class="mx-auto max-w-5xl px-4 pb-10 text-sm text-muted-foreground">
    Local-first · served from your own SQLite catalogue
  </footer>
  <script src="/static/vendor/htmx.min.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
</body>
</html>
