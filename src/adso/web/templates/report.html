{% extends "base.html" %}
{% block title %}Adso · {{ report_title }}{% endblock %}
{% block content %}
<div class="mb-4 flex flex-wrap items-center gap-3">
  <h1 class="text-2xl font-semibold tracking-tight">{{ report_title }}</h1>
  <a href="/activity" class="text-sm text-muted-foreground hover:text-foreground">← Activity</a>
</div>
<div class="card">
  <pre class="overflow-x-auto whitespace-pre-wrap font-mono text-sm leading-relaxed text-foreground">{{ report_body }}</pre>
</div>
{% endblock %}
