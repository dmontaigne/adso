{# Edit form for the local-catalogue fields. Posts back the read view. #}
<div id="local-card" class="card">
  <header class="flex items-center justify-between">
    <h2>Local catalogue</h2>
    <span class="text-xs text-muted-foreground">Editing</span>
  </header>
  <section>
    {% if error %}<div class="alert-destructive mb-3">{{ error }}</div>{% endif %}
    <form hx-post="/book/{{ book.goodreads_id }}/local"
          hx-target="#local-card"
          hx-swap="outerHTML"
          class="grid gap-3 text-sm">
      <label class="grid gap-1">
        <span class="text-muted-foreground">Format</span>
        <select class="input" name="format">
          <option value="" {% if not book["format"] %}selected{% endif %}>— Not owned</option>
          <option value="physical" {% if book["format"] == "physical" %}selected{% endif %}>Physical</option>
          <option value="ebook" {% if book["format"] == "ebook" %}selected{% endif %}>Ebook</option>
          <option value="audiobook" {% if book["format"] == "audiobook" %}selected{% endif %}>Audiobook</option>
        </select>
      </label>
      <label class="grid gap-1">
        <span class="text-muted-foreground">Tags</span>
        <input class="input" type="text" name="tags" value="{{ book.tags | join(', ') }}"
               placeholder="philosophy, medieval, …">
      </label>
      <label class="grid gap-1">
        <span class="text-muted-foreground">Loaned to</span>
        <input class="input" type="text" name="loaned_to" value="{{ book.loaned_to or '' }}">
      </label>
      <label class="grid gap-1">
        <span class="text-muted-foreground">Local notes</span>
        <textarea class="input" name="local_notes" rows="3">{{ book.local_notes or '' }}</textarea>
      </label>
      <div class="flex gap-2">
        <button class="btn-sm" type="submit">Save</button>
        <button class="btn-sm-ghost" type="button"
                hx-get="/book/{{ book.goodreads_id }}/local"
                hx-target="#local-card"
                hx-swap="outerHTML">Cancel</button>
      </div>
    </form>
  </section>
</div>
