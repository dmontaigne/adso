name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with extras
        run: python -m pip install -e ".[web,notion,covers]"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  install-check:
    name: Install check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from a clean checkout
        run: python -m pip install .
      - name: Smoke-test the console script
        run: |
          adso --help
          mkdir -p "$RUNNER_TEMP/smoke"
          cd "$RUNNER_TEMP/smoke"
          adso doctor

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install -e ".[dev]"
      - name: Run ruff
        run: ruff check .
